<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novidades e Lembretes — Mollab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    
    <style>
        .timeline-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            padding: 20px 0;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
        }

        .timeline-date {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .timeline-card {
            background: var(--tech-surface);
            border: var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 24px;
            transition: border-color 0.3s ease;
        }

        .timeline-card:hover {
            border-color: var(--accent-purple);
        }

        .timeline-card h3 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .timeline-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        /* Cores dinâmicas para os ícones */
        .icon-evento { background: var(--accent-purple); }
        .icon-lembrete { background: var(--color-warning); }
        .icon-atualizacao { background: var(--color-success); }

        /* Estilos do Dashboard de Novidades */
        .novidades-dashboard {
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 50px;
            align-items: flex-start;
            margin-top: 40px;
        }

        @media (max-width: 1200px) {
            .novidades-dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* Bloco do Calendário */
        .calendar-block {
            background: var(--tech-surface);
            border: var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 24px;
            position: sticky;
            top: 100px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-primary);
            text-transform: capitalize;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .btn-cal {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-cal:hover {
            background: rgba(157, 78, 221, 0.2);
            border-color: var(--accent-purple);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .weekday {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-muted);
            padding: 15px 0;
            text-transform: uppercase;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-secondary);
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .day:hover:not(.empty) {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: scale(1.05);
        }

        body.light-mode .day:hover:not(.empty) {
            background: #240046; /* Roxo Escuro solicitado */
            color: #fff;
            box-shadow: 0 4px 15px rgba(36, 0, 70, 0.3);
        }

        /* Simplificando o "Hoje" para focar nos "Eventos" */
        .day.today {
            color: var(--accent-purple);
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* Marcação DISTINTA somente para dias com evento */
        .day.has-event {
            color: #fff !important;
            background: #C229B6 !important; /* Cor exata solicitada anteriormente */
            border: none;
            box-shadow: 0 0 20px rgba(194, 41, 182, 0.4);
            transform: scale(1.05);
        }

        .day.has-event::after {
            display: none; /* Removendo o ponto para usar o fundo preenchido */
        }

        body.light-mode .btn-cal { color: var(--text-primary); }
        body.light-mode .day.has-event::after { background: var(--accent-purple); }
    </style>
</head>

<body>
    <!-- Topo do site -->
    <header class="header">
        <div class="container header-inner">
            <a href="home.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="3" fill="currentColor" />
                        <ellipse cx="12" cy="12" rx="10" ry="4" stroke="currentColor" stroke-width="2" transform="rotate(45 12 12)" />
                        <ellipse cx="12" cy="12" rx="10" ry="4" stroke="currentColor" stroke-width="2" transform="rotate(-45 12 12)" />
                    </svg>
                </div>
                <span class="logo-text">Mollab</span>
            </a>
            <nav class="nav-desktop">
                <a href="home.html">Início</a>
                <a href="disciplinas.html">Disciplinas</a>
                <a href="experimentos.html">Experimentos</a>
                <a href="novidades.html" class="active">Novidades</a>
                <a href="sobre.html">Sobre</a>
            </nav>
            <div class="header-actions">
                <button class="btn-icon" id="theme-toggle" aria-label="Alternar Tema">
                    <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                    </svg>
                </button>
                <a href="index.html" class="btn-login">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span>Entrar</span>
                </a>
                <button class="btn-icon menu-toggle" aria-label="Menu" onclick="document.getElementById('mobile-nav').classList.toggle('open')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="4" x2="20" y1="12" y2="12" />
                        <line x1="4" x2="20" y1="6" y2="6" />
                        <line x1="4" x2="20" y1="18" y2="18" />
                    </svg>
                </button>
            </div>
        </div>
        <!-- Menu Mobile -->
        <nav class="nav-mobile" id="mobile-nav">
            <a href="home.html">Início</a>
            <a href="disciplinas.html">Disciplinas</a>
            <a href="experimentos.html">Experimentos</a>
            <a href="novidades.html">Novidades</a>
            <a href="sobre.html">Sobre</a>
        </nav>
    </header>

    <section class="page-hero">
        <div class="container">
            <h1>Mural de <span class="text-cyan">Novidades</span></h1>
        </div>
    </section>
    
    

    <!-- Conteúdo Principal -->
    <section class="container" style="padding-bottom: 100px;">
        <div class="novidades-dashboard">
            
            <!-- Coluna 1: Calendário Interativo -->
            <div class="calendar-block">
                <div class="calendar-header">
                    <h2 id="current-month">Abril 2026</h2>
                    <div class="calendar-nav">
                        <button class="btn-cal" id="prev-month">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <button class="btn-cal" id="next-month">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Dias gerados via JS -->
                </div>
            </div>

            <!-- Coluna 2: Linha do Tempo -->
            <div class="timeline-container" id="timeline-container">
                <div style="text-align: center; color: var(--text-secondary); padding: 40px;">
                    Carregando novidades...
                </div>
            </div>

        </div>
    </section>

    <!-- Rodapé simples -->
    <footer class="footer footer-centered">
        <div class="container footer-grid">
            <div>
                <h3 class="footer-brand">Mollab</h3>
                
            </div>
        </div>
        <div class="container footer-bottom">
            © 2026 Mollab. Todos os direitos reservados.
        </div>
    </footer>

    <!-- Scripts de integração com Firebase e Lógica do Site -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="database.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var db = firebase.firestore();
            var container = document.getElementById('timeline-container');
            var calendarGrid = document.getElementById('calendar-grid');
            var monthDisplay = document.getElementById('current-month');
            
            var currentDate = new Date();
            var viewYear = currentDate.getFullYear();
            var viewMonth = currentDate.getMonth();
            var allEvents = [];

            // Nomes dos meses em Português
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", 
                                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

            // Dias da semana
            const weekDays = ["D", "S", "T", "Q", "Q", "S", "S"];

            // Buscar eventos do Firestore
            function fetchEvents() {
                db.collection('calendar_events')
                  .orderBy('date', 'desc')
                  .get()
                  .then(function(snapshot) {
                      allEvents = [];
                      if (snapshot.empty) {
                          container.innerHTML = 
                            '<div class="empty-state-block">' +
                            '  <p>Nenhum evento registrado no momento.</p>' +
                            '  <span>Assim que o professor publicar algo, aparecerá aqui.</span>' +
                            '</div>';
                          renderCalendar();
                          return;
                      }

                      let html = '';
                      snapshot.forEach(function(doc) {
                          var ev = doc.data();
                          ev.id = doc.id;
                          allEvents.push(ev);
                          
                          var iconColorClass = 'icon-evento';
                          var iconSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

                          if (ev.type === 'Lembrete') {
                              iconColorClass = 'icon-lembrete';
                              iconSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>';
                          } else if (ev.type === 'Atualização') {
                              iconColorClass = 'icon-atualizacao';
                              iconSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
                          }

                          var formatDate = ev.date.split('-').reverse().join('/');

                          html += '<div class="timeline-item" data-date="' + ev.date + '">';
                          html += '  <span class="timeline-date">' + formatDate + ' • ' + (ev.type || 'Evento') + '</span>';
                          html += '  <div class="timeline-card">';
                          html += '    <h3>' + (ev.title || 'Sem Título') + '</h3>';
                          html += '    <p>' + (ev.description || '').replace(/\n/g, '<br>') + '</p>';
                          html += '  </div>';
                          html += '</div>';
                      });

                      container.innerHTML = html;
                      renderCalendar();
                  })
                  .catch(function(error) {
                      console.error("Erro ao buscar novidades:", error);
                      container.innerHTML = '<div style="color: var(--color-error); text-align: center;">Erro ao carregar novidades.</div>';
                  });
            }

            function renderCalendar() {
                calendarGrid.innerHTML = '';
                monthDisplay.innerText = monthNames[viewMonth] + ' ' + viewYear;

                // Adicionar cabeçalho dos dias da semana
                weekDays.forEach(day => {
                    const el = document.createElement('div');
                    el.className = 'weekday';
                    el.innerText = day;
                    calendarGrid.appendChild(el);
                });

                const firstDay = new Date(viewYear, viewMonth, 1).getDay();
                const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

                // Espaços vazios para o início do mês
                for (let i = 0; i < firstDay; i++) {
                    const el = document.createElement('div');
                    el.className = 'day empty';
                    calendarGrid.appendChild(el);
                }

                // Gerar os dias do mês
                for (let d = 1; d <= daysInMonth; d++) {
                    const el = document.createElement('div');
                    el.className = 'day';
                    el.innerText = d;

                    // Formatar data para comparação (YYYY-MM-DD)
                    const dateStr = viewYear + '-' + String(viewMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');

                    // Verificar se é hoje
                    const now = new Date();
                    if (d === now.getDate() && viewMonth === now.getMonth() && viewYear === now.getFullYear()) {
                        el.classList.add('today');
                    }

                    // Verificar se tem evento nesta data
                    const hasEvent = allEvents.some(ev => ev.date === dateStr);
                    if (hasEvent) {
                        el.classList.add('has-event');
                        el.title = "Clique para ver atividades deste dia";
                        el.onclick = function() {
                            const target = document.querySelector('.timeline-item[data-date="' + dateStr + '"]');
                            if (target) {
                                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                target.querySelector('.timeline-card').style.borderColor = 'var(--accent-purple)';
                                setTimeout(() => {
                                    target.querySelector('.timeline-card').style.borderColor = '';
                                }, 2000);
                            }
                        };
                    }

                    calendarGrid.appendChild(el);
                }
            }

            // Navegação de Meses
            document.getElementById('prev-month').onclick = function() {
                viewMonth--;
                if (viewMonth < 0) {
                    viewMonth = 11;
                    viewYear--;
                }
                renderCalendar();
            };

            document.getElementById('next-month').onclick = function() {
                viewMonth++;
                if (viewMonth > 11) {
                    viewMonth = 0;
                    viewYear++;
                }
                renderCalendar();
            };

            // Iniciar busca
            fetchEvents();
        });
    </script>
</body>
</html>
