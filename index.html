<!DOCTYPE html>
<html lang="pt-BR">
<!-- / Cabeçalho da página de login -->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Mollab</title>
    <meta name="description"
        content="Faça login ou crie sua conta no Mollab para acompanhar seu progresso de aprendizado." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <style>
        /* Estilo para o botão flutuante de tema no Login */
        .login-theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 110;
        }

        .btn-theme-float {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-theme-float:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        body.light-mode .btn-theme-float {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            color: #4a148c;
        }
    </style>
</head>

<body class="login-body">



    <!-- / Estrutura principal dividida em dois painéis: Decorativo e Formulário -->
    <div class="login-wrapper">
        <div class="login-form-side">
            <div class="login-form-container">
                <div class="login-form-header">
                    <h2 id="login-title">Acesse sua conta</h2>
                </div>

                <div class="auth-tabs">
                    <button type="button" class="auth-tab active" id="tab-student" onclick="switchLoginTab('student')">Aluno</button>
                    <button type="button" class="auth-tab" id="tab-admin" onclick="switchLoginTab('admin')">Admin</button>
                </div>

                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="seu@email.com" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required />
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="remember" checked />
                            <span class="checkmark"></span>
                            Lembrar
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">Entrar</button>

                    <div class="login-divider"><span>ou entre com</span></div>

                    <button type="button" class="btn-google" id="btn-google-login" onclick="handleGoogleLogin()">
                         <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                         Google
                    </button>
                </form>

                <div id="student-bottom-options">
                    <a href="home.html" class="btn-skip">Visitar como convidado</a>
                    <p class="signup-text">
                        Não tem conta? <a href="#" onclick="toggleAuthMode()">Crie uma aqui</a>
                    </p>
                </div>
            </div>
            
            <button class="btn-theme-float" id="theme-toggle" aria-label="Alternar Tema" style="position: absolute; top: 24px; right: 24px;">
                <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
        </div>
    </div>

    <!-- / Scripts de integração Firebase e lógica de UI -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="database.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>

</html>
